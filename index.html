<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CS Quest 🎮 — コンピュータサイエンス冒険譚</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="RPG × 本格コンピュータサイエンス講座。Coding Interview University をゲーム化した学習コース。">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#42b983">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #42b983; }
    /* スマホで読みやすい行間と余白 */
    .markdown-section { max-width: 48rem; padding: 16px 16px 64px; }
    .markdown-section p, .markdown-section li { line-height: 1.75; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section pre { white-space: pre; overflow-x: auto; }
    /* タップしやすい details サマリ */
    .markdown-section details > summary {
      cursor: pointer; padding: 8px 0; font-weight: 600; color: var(--theme-color);
    }
    /* 夜間のダークモード(端末設定に追従) */
    @media (prefers-color-scheme: dark) {
      body, .sidebar, .content { background: #1b1b1f; }
      .markdown-section { color: #e3e3e3; }
      .markdown-section h1, .markdown-section h2, .markdown-section h3,
      .markdown-section h4, .markdown-section strong { color: #f5f5f5; }
      .sidebar { border-right: 1px solid #2a2a2a; }
      .sidebar a, .app-name-link { color: #cfcfcf; }
      .markdown-section tr { background: #1b1b1f; border-top-color: #333; }
      .markdown-section tr:nth-child(2n) { background: #232327; }
      .markdown-section th, .markdown-section td { border-color: #333; }
      .markdown-section code { background: #2a2a2e; color: #ff8f8f; }
      .markdown-section pre { background: #232327; }
      .markdown-section pre > code { background: transparent; color: #e3e3e3; }
      .markdown-section blockquote { color: #b8b8b8; border-left-color: var(--theme-color); }
      .search input { background: #232327; color: #e3e3e3; }
      .search { border-bottom-color: #2a2a2a; }
    }
  </style>
</head>
<body>
  <div id="app">📖 ロード中… / Loading…</div>
  <script>
    window.$docsify = {
      name: 'CS Quest 🎮',
      nameLink: '#/',
      repo: 'https://github.com/atsushi-ambo/cs-academy',
      // 各 Markdown ファイルの相対リンク(world-02.md や ../README.md)を
      // GitHub と同じ感覚で解決させる。これが無いと世界間リンクが壊れる。
      relativePath: true,
      loadSidebar: false,        // 各ページの見出しから自動で目次を作る
      autoHeader: false,
      subMaxLevel: 3,            // サイドバーの目次に H2・H3 まで表示
      auto2top: true,            // ページ移動で先頭にスクロール
      maxLevel: 4,
      homepage: 'README.md',
      notFoundPage: true,
      search: {
        placeholder: '🔍 検索 / Search…',
        noData: '見つかりませんでした / No results',
        depth: 4,
        paths: 'auto',
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3"></script>
  <!-- コードのシンタックスハイライト(Python 中心) -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
